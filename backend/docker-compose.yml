version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: notepassing-db
    environment:
      POSTGRES_USER: notepassing
      POSTGRES_PASSWORD: notepassing-secret
      POSTGRES_DB: notepassing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notepassing"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: notepassing-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://notepassing:notepassing-secret@db:5432/notepassing
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-false}
      TEMP_ID_EXPIRE_MINUTES: 10
      TEMP_ID_BUFFER_MINUTES: 5
      BOOST_COOLDOWN_MINUTES: 5
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
